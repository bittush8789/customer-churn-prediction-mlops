apiVersion: apps/v1
kind: Deployment
metadata:
  name: customer-churn-deployment
  namespace: customer-churn
  labels:
    app: customer-churn
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
  selector:
    matchLabels:
      app: customer-churn
  template:
    metadata:
      labels:
        app: customer-churn
    spec:
      containers:
        - name: churn-container
          image: customer-churn-platform:latest
          ports:
            - containerPort: 5000
          resources:
            limits:
              cpu: "1"
              memory: 1Gi
            requests:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 10
