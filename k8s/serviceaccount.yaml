apiVersion: v1
kind: ServiceAccount
metadata:
  name: customer-churn-sa
  namespace: customer-churn
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: customer-churn-kserve-rolebinding
subjects:
- kind: ServiceAccount
  name: customer-churn-sa
  namespace: customer-churn
roleRef:
  kind: ClusterRole
  name: cluster-admin
  apiGroup: rbac.authorization.k8s.io
