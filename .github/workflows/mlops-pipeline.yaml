name: MLOps Pipeline

on:
  push:
    branches: [cicd]
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  S3_BUCKET: churn-model-bucket-cicd-abhi

jobs:
  train-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Required to push commits
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      with:
        token: ${{ secrets.GITHUB_TOKEN }}  # Use built-in token
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        pip install -r requirements.txt
    
    - name: Generate dataset
      run: python generate_data.py

    - name: Run Data Drift Checks
      run: python check_drift.py
    
    - name: Train model
      run: python train.py

    - name: Model Validation & Performance Gatekeeping
      run: python compare_models.py
    
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}
    
    - name: Push model to S3 directly
      run: |
        aws s3 cp models/churn_model.pkl s3://churn-model-bucket-cicd-abhi/models/churn_model.pkl
        echo "Model pushed to S3 is success"

    - name: Build and Push Docker Image
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/churn-app:${{ github.sha }} .
        echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
        docker push ${{ secrets.DOCKER_USERNAME }}/churn-app:${{ github.sha }}
    
    - name: Update Kubernetes Deployments Manifest via Kustomize
      run: |
        cd k8s
        # Install kustomize if not present
        curl -s "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
        ./kustomize edit set image customer-churn-platform=${{ secrets.DOCKER_USERNAME }}/churn-app:${{ github.sha }}
        
        # Update storageUri path
        MODEL_URI="s3://churn-model-bucket-cicd-abhi/models/churn_model.pkl"
        sed -i "s|storageUri: .*|storageUri: $MODEL_URI|g" inference.yaml
    
    - name: Commit updated Kubernetes manifests
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add k8s/kustomization.yaml k8s/inference.yaml
        git commit -m "Update model S3 path and image tag via Kustomize [skip ci]" || echo "No changes"
        git push || echo "No changes to push"
