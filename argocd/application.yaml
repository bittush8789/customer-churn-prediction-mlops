apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: customer-churn-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/bittush8789/customer-churn-prediction-mlops.git'
    targetRevision: HEAD
    path: k8s
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: customer-churn
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
